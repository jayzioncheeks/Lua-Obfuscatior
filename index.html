<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KittyScripts - Script Hub</title>
    
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/jayzioncheeks/KittyScripts-Hub/refs/heads/main/Untitled30_20260227180647.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-base: #0a0612;
            --bg-elevated: #120a1f;
            --bg-card: #1a0f2e;
            --accent-primary: #7c3aed;
            --accent-glow: rgba(124, 58, 237, 0.25);
            --accent-bright: #a78bfa;
            --text-primary: #f8f8f9;
            --text-muted: #9f93b3;
            --text-dim: #6e5f88;
            --border-subtle: #2a1a3f;
            --border-bright: #3d2554;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #8b5cf6;
        }

        [data-theme="light"] {
            --bg-base: #faf8fc;
            --bg-elevated: #f3f0f7;
            --bg-card: #ffffff;
            --accent-primary: #7c3aed;
            --accent-glow: rgba(124, 58, 237, 0.15);
            --accent-bright: #a78bfa;
            --text-primary: #1a0f2e;
            --text-muted: #6e5f88;
            --text-dim: #9f93b3;
            --border-subtle: #e5dff0;
            --border-bright: #d1c7e0;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #8b5cf6;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: var(--bg-base);
            color: var(--text-primary);
            font-family: 'Syne', sans-serif;
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
            transition: background 0.3s ease, color 0.3s ease;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: 
                radial-gradient(circle at 20% 50%, var(--accent-glow) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.15) 0%, transparent 50%);
            animation: gradientShift 20s ease infinite;
            pointer-events: none;
            z-index: 0;
        }
        
        @keyframes gradientShift {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(5%, 5%) rotate(120deg); }
            66% { transform: translate(-5%, 5%) rotate(240deg); }
        }

        /* ── Theme Toggle ── */
        .theme-toggle {
            position: fixed;
            bottom: 2rem; right: 2rem;
            width: 54px; height: 54px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-bright));
            border: none;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 8px 24px var(--accent-glow);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
        }
        .theme-toggle:hover { transform: scale(1.1) rotate(10deg); }
        .theme-toggle svg { width: 24px; height: 24px; fill: white; }
        .theme-toggle .sun-icon { display: none; }
        .theme-toggle .moon-icon { display: block; }
        [data-theme="light"] .theme-toggle .sun-icon { display: block; }
        [data-theme="light"] .theme-toggle .moon-icon { display: none; }

        /* ── Navbar ── */
        .navbar {
            position: sticky; top: 0; z-index: 100;
            display: flex; justify-content: space-between; align-items: center;
            padding: 1.25rem 3rem;
            backdrop-filter: blur(20px) saturate(180%);
            background: rgba(18, 10, 31, 0.85);
            border-bottom: 1px solid var(--border-subtle);
            transition: background 0.3s ease, border-color 0.3s ease;
        }
        [data-theme="light"] .navbar { background: rgba(243, 240, 247, 0.95); }
        .navbar::after {
            content: '';
            position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-primary) 30%, var(--accent-primary) 70%, transparent);
            opacity: 0.3;
        }
        
        .tabs { display: flex; gap: 0.75rem; position: relative; }
        .tab {
            padding: 0.625rem 1.5rem;
            cursor: pointer; border-radius: 10px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 600; font-size: 0.95rem;
            letter-spacing: 0.02em;
            border: 1px solid transparent; background: transparent;
        }
        .tab:hover { color: var(--accent-bright); transform: translateY(-1px); }
        .tab.active {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-bright));
            color: white;
            box-shadow: 0 8px 24px var(--accent-glow);
        }
        
        .social-buttons { display: flex; gap: 0.5rem; }
        .discord-icon-btn, .youtube-icon-btn, .tiktok-icon-btn, .keysystem-icon-btn {
            display: flex; align-items: center; justify-content: center;
            border: none; padding: 0.625rem; border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative; overflow: hidden;
            width: 44px; height: 44px;
        }
        .discord-icon-btn { background: linear-gradient(135deg, #5865f2, #7289da); box-shadow: 0 4px 16px rgba(88,101,242,0.25); }
        .youtube-icon-btn { background: linear-gradient(135deg, #ff0000, #cc0000); box-shadow: 0 4px 16px rgba(255,0,0,0.25); }
        .tiktok-icon-btn { background: linear-gradient(135deg, #000000, #ff0050); box-shadow: 0 4px 16px rgba(255,0,80,0.25); }
        .keysystem-icon-btn { background: transparent; border: 1px solid var(--border-subtle); }
        .discord-icon-btn:hover { transform: translateY(-2px) scale(1.02); box-shadow: 0 8px 24px rgba(88,101,242,0.4); }
        .youtube-icon-btn:hover { transform: translateY(-2px) scale(1.02); box-shadow: 0 8px 24px rgba(255,0,0,0.4); }
        .tiktok-icon-btn:hover { transform: translateY(-2px) scale(1.02); box-shadow: 0 8px 24px rgba(255,0,80,0.4); }
        .keysystem-icon-btn:hover { transform: translateY(-2px) scale(1.02); border-color: var(--accent-primary); }
        .discord-icon, .youtube-icon, .tiktok-icon, .keysystem-icon { width: 20px; height: 20px; fill: white; }

        /* ── Content ── */
        .content {
            max-width: 1400px; margin: 0 auto;
            padding: 3rem 2rem;
            position: relative; z-index: 1;
        }

        /* ── Main Tab ── */
        #mainTab {
            text-align: center; padding: 6rem 2rem;
            animation: fadeInUp 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #mainTab h1 {
            font-size: clamp(3rem, 8vw, 6rem); font-weight: 800;
            margin-bottom: 2rem;
            background: linear-gradient(135deg, var(--accent-bright) 0%, var(--accent-primary) 30%, #a855f7 60%, var(--accent-primary) 100%);
            background-size: 200% 200%;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            animation: gradientFlow 8s ease infinite;
            letter-spacing: -0.03em; line-height: 1.1;
        }
        @keyframes gradientFlow { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
        .logo-container { position: relative; display: inline-block; margin: 2rem 0; }
        .logo-container::before {
            content: '';
            position: absolute; inset: -20px;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            border-radius: 50%; animation: pulse 3s ease-in-out infinite; z-index: -1;
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.1); opacity: 0.8; } }
        #mainTab img {
            width: 240px; height: auto; border-radius: 24px;
            box-shadow: 0 0 60px var(--accent-glow), 0 20px 60px rgba(0,0,0,0.5);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid var(--border-bright);
        }
        #mainTab img:hover { transform: scale(1.05) translateY(-5px); }
        .tagline { font-size: 1.25rem; color: var(--text-muted); font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; margin-top: 2rem; }
        .tagline span { display: inline-block; animation: fadeInUp 0.6s cubic-bezier(0.4, 0, 0.2, 1) backwards; }
        .tagline span:nth-child(1) { animation-delay: 0.2s; }
        .tagline span:nth-child(2) { animation-delay: 0.3s; color: var(--accent-bright); }
        .tagline span:nth-child(3) { animation-delay: 0.4s; }
        .tagline span:nth-child(4) { animation-delay: 0.5s; color: var(--accent-bright); }
        .tagline span:nth-child(5) { animation-delay: 0.6s; }

        /* ── Scripts Tab ── */
        #scriptsTab { animation: fadeInUp 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .script-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 3rem; padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-subtle);
            position: relative;
        }
        .script-header::after {
            content: ''; position: absolute; bottom: -1px; left: 0;
            width: 120px; height: 2px;
            background: linear-gradient(90deg, var(--accent-primary), transparent);
        }
        .script-header h2 { font-size: 2.5rem; font-weight: 800; letter-spacing: -0.02em; }
        .header-left { display: flex; align-items: center; gap: 1.5rem; }
        .search-input {
            background: var(--bg-elevated); border: 1px solid var(--border-subtle);
            border-radius: 10px; padding: 0.75rem 1.25rem;
            color: var(--text-primary); font-size: 0.95rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            width: 200px; font-family: 'Syne', sans-serif;
        }
        .search-input:focus { outline: none; border-color: var(--accent-primary); box-shadow: 0 0 0 3px var(--accent-glow); width: 250px; }
        .search-input::placeholder { color: var(--text-dim); }
        .refresh-btn {
            background: var(--bg-elevated); border: 1px solid var(--border-subtle);
            border-radius: 10px; padding: 0.75rem 1rem;
            color: var(--text-primary); cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; align-items: center; gap: 0.5rem;
            font-family: 'Syne', sans-serif; font-weight: 600; font-size: 0.95rem;
        }
        .refresh-btn:hover { border-color: var(--accent-primary); box-shadow: 0 4px 12px var(--accent-glow); }
        .refresh-btn.loading { opacity: 0.6; pointer-events: none; }
        .refresh-btn.loading svg { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* ── Script Grid (masonry) ── */
        #scriptsContainer { columns: 3; column-gap: 1.5rem; }

        /* ── Script Card (clickable preview) ── */
        .script-card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            break-inside: avoid;
            margin-bottom: 1.5rem;
            display: inline-block;
            width: 100%;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            animation: fadeInUp 0.5s cubic-bezier(0.4, 0, 0.2, 1) backwards;
            position: relative;
            overflow: hidden;
        }
        .script-card::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-primary), transparent);
            opacity: 0; transition: opacity 0.4s;
        }
        .script-card:hover::before { opacity: 1; }
        .script-card:hover {
            border-color: var(--border-bright);
            transform: translateY(-5px);
            box-shadow: 0 20px 48px rgba(0,0,0,0.4), 0 0 0 1px var(--border-bright);
        }

        /* Thumbnail */
        .card-thumb-wrap {
            width: 100%; overflow: hidden;
            border-radius: 15px 15px 0 0;
        }
        .script-thumbnail {
            width: 100%; height: 160px;
            object-fit: cover; display: block;
            transition: transform 0.4s ease;
        }
        .script-card:hover .script-thumbnail { transform: scale(1.04); }

        /* Card body */
        .card-body { padding: 1.4rem 1.5rem 1.5rem; }

        .card-top {
            display: flex; align-items: flex-start;
            justify-content: space-between; gap: 0.5rem;
            margin-bottom: 0.75rem;
        }
        .card-title { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.01em; line-height: 1.3; }
        .card-game { font-size: 0.82rem; color: var(--text-muted); margin-bottom: 0.85rem; }

        .card-snippet {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.78rem;
            color: var(--text-dim);
            background: var(--bg-elevated);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            padding: 0.7rem 0.9rem;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            line-height: 1.5;
            margin-bottom: 1rem;
        }

        .card-footer {
            display: flex; align-items: center; justify-content: space-between;
            gap: 0.5rem;
        }
        .script-badges { display: flex; gap: 0.4rem; flex-wrap: wrap; }
        .badge {
            padding: 0.2rem 0.6rem; border-radius: 6px;
            font-size: 0.7rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.05em;
        }
        .badge.universal { background: linear-gradient(135deg, #10b981, #059669); color: white; }
        .badge.key-system { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; }
        .badge.verified { background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; }

        .view-btn {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-bright));
            color: white; border: none; border-radius: 8px;
            padding: 0.45rem 1rem;
            font-family: 'Syne', sans-serif;
            font-size: 0.82rem; font-weight: 700;
            cursor: pointer; white-space: nowrap;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px var(--accent-glow);
        }
        .view-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 18px var(--accent-glow); }

        /* ── MODAL ── */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(5, 2, 10, 0.82);
            backdrop-filter: blur(12px) saturate(140%);
            z-index: 5000;
            display: flex; align-items: center; justify-content: center;
            padding: 1.5rem;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .modal-overlay.open { opacity: 1; pointer-events: all; }

        .modal {
            background: var(--bg-card);
            border: 1px solid var(--border-bright);
            border-radius: 20px;
            width: 100%; max-width: 680px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 30px 80px rgba(0,0,0,0.7), 0 0 0 1px var(--border-bright);
            transform: translateY(30px) scale(0.97);
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        .modal-overlay.open .modal {
            transform: translateY(0) scale(1);
        }

        .modal::-webkit-scrollbar { width: 5px; }
        .modal::-webkit-scrollbar-track { background: transparent; }
        .modal::-webkit-scrollbar-thumb { background: var(--accent-primary); border-radius: 3px; }

        /* Top glow stripe */
        .modal::before {
            content: '';
            display: block; height: 3px;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-bright), var(--accent-primary));
            border-radius: 20px 20px 0 0;
        }

        .modal-close {
            position: absolute; top: 1.1rem; right: 1.1rem;
            width: 36px; height: 36px;
            border-radius: 50%;
            background: var(--bg-elevated);
            border: 1px solid var(--border-bright);
            color: var(--text-muted);
            font-size: 1.1rem; font-weight: 700;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.2s ease;
            z-index: 10;
        }
        .modal-close:hover { background: var(--danger); color: white; border-color: var(--danger); transform: rotate(90deg); }

        .modal-thumb {
            width: 100%; height: 220px;
            object-fit: cover; display: block;
        }
        .modal-thumb-placeholder {
            width: 100%; height: 6px;
        }

        .modal-body { padding: 1.75rem 2rem 2rem; }

        .modal-title-row {
            display: flex; align-items: flex-start;
            justify-content: space-between; gap: 1rem;
            margin-bottom: 0.5rem;
        }
        .modal-title { font-size: 1.7rem; font-weight: 800; letter-spacing: -0.02em; line-height: 1.2; }
        .modal-game {
            display: inline-flex; align-items: center; gap: 0.4rem;
            font-size: 0.88rem; color: var(--accent-bright); font-weight: 600;
            margin-bottom: 1.25rem;
            text-decoration: none;
            cursor: pointer;
            padding: 0.35rem 0.75rem;
            background: rgba(124, 58, 237, 0.1);
            border: 1px solid rgba(167, 139, 250, 0.2);
            border-radius: 8px;
            transition: all 0.2s ease;
        }
        .modal-game:hover {
            background: rgba(124, 58, 237, 0.2);
            border-color: var(--accent-bright);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px var(--accent-glow);
        }
        .modal-game svg { width: 14px; height: 14px; fill: var(--accent-bright); }
        .modal-game .external-icon { fill: none; stroke: var(--accent-bright); width: 12px; height: 12px; opacity: 0.7; }

        .modal-badges { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.5rem; }

        .modal-section-label {
            font-size: 0.7rem; font-weight: 700; letter-spacing: 0.12em;
            text-transform: uppercase; color: var(--text-dim);
            margin-bottom: 0.6rem;
        }

        .modal-code-wrap {
            position: relative;
            margin-bottom: 1.75rem;
        }
        .modal-code {
            background: var(--bg-elevated);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            padding: 1.25rem;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.83rem;
            color: var(--text-muted);
            line-height: 1.65;
            overflow-x: auto;
            max-height: 260px;
            overflow-y: auto;
            white-space: pre;
        }
        .modal-code::-webkit-scrollbar { width: 5px; height: 5px; }
        .modal-code::-webkit-scrollbar-track { background: transparent; }
        .modal-code::-webkit-scrollbar-thumb { background: var(--accent-primary); border-radius: 3px; }

        .modal-actions { display: flex; gap: 0.75rem; }

        .btn-copy-modal {
            flex: 1;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-bright));
            color: white; border: none; border-radius: 12px;
            padding: 0.9rem 1.5rem;
            font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 0.6rem;
            box-shadow: 0 6px 20px var(--accent-glow);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative; overflow: hidden;
        }
        .btn-copy-modal::before {
            content: '';
            position: absolute; top: 50%; left: 50%;
            width: 0; height: 0; border-radius: 50%;
            background: rgba(255,255,255,0.12);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        .btn-copy-modal:active::before { width: 400px; height: 400px; }
        .btn-copy-modal:hover { transform: translateY(-2px); box-shadow: 0 10px 28px var(--accent-glow); }
        .btn-copy-modal svg { width: 18px; height: 18px; stroke: white; fill: none; stroke-width: 2; }

        .btn-close-modal {
            background: var(--bg-elevated); border: 1px solid var(--border-bright);
            color: var(--text-muted); border-radius: 12px;
            padding: 0.9rem 1.25rem;
            font-family: 'Syne', sans-serif; font-size: 0.95rem; font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-close-modal:hover { border-color: var(--accent-primary); color: var(--text-primary); }

        /* ── Toast ── */
        .toast {
            position: fixed; bottom: 2rem; left: 2rem;
            background: var(--bg-card); border: 1px solid var(--border-bright);
            padding: 1rem 1.5rem; border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
            display: flex; align-items: center; gap: 0.75rem;
            opacity: 0; transform: translateY(20px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 9999; pointer-events: none;
            font-weight: 600;
        }
        .toast.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
        .toast.success { border-color: var(--success); }
        .toast.error { border-color: var(--danger); }

        /* ── Loading / Empty ── */
        .loading-spinner { text-align: center; padding: 4rem 2rem; color: var(--text-muted); }
        .spinner {
            width: 50px; height: 50px; margin: 0 auto 1rem;
            border: 4px solid var(--border-subtle); border-top-color: var(--accent-primary);
            border-radius: 50%; animation: spin 1s linear infinite;
        }
        .empty-state { text-align: center; padding: 6rem 2rem; color: var(--text-dim); }
        .empty-state h3 { margin-top: 1.5rem; font-size: 1.75rem; color: var(--text-muted); font-weight: 700; }
        .empty-state p { margin-top: 0.5rem; font-size: 1.1rem; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ── Responsive ── */
        @media (max-width: 1100px) {
            #scriptsContainer { columns: 2; }
        }
        @media (max-width: 768px) {
            .navbar { padding: 1rem 1.5rem; }
            .tabs { gap: 0.5rem; }
            .tab { padding: 0.5rem 1rem; font-size: 0.85rem; }
            .discord-icon-btn, .youtube-icon-btn, .tiktok-icon-btn, .keysystem-icon-btn { width: 38px; height: 38px; }
            .discord-icon, .youtube-icon, .tiktok-icon, .keysystem-icon { width: 18px; height: 18px; }
            #mainTab { padding: 3rem 1rem; }
            #mainTab h1 { font-size: 2.5rem; }
            #scriptsContainer { columns: 1; }
            .content { padding: 2rem 1rem; }
            .theme-toggle { bottom: 1rem; right: 1rem; width: 48px; height: 48px; }
            .theme-toggle svg { width: 20px; height: 20px; }
            .header-left { flex-direction: column; gap: 1rem; align-items: flex-start; width: 100%; }
            .search-input { width: 100%; }
            .search-input:focus { width: 100%; }
            .script-header { flex-direction: column; align-items: flex-start; gap: 1rem; }
            .script-header h2 { font-size: 2rem; }
            .refresh-btn { width: 100%; justify-content: center; }
            .toast { right: 1rem; left: 1rem; bottom: 6rem; }
            .modal-body { padding: 1.25rem 1.25rem 1.5rem; }
            .modal-title { font-size: 1.35rem; }
            .modal-thumb { height: 160px; }
        }
        /* ── Sort Dropdown ── */
        .sort-wrap { position: relative; }

        .sort-btn {
            background: var(--bg-elevated); border: 1px solid var(--border-subtle);
            border-radius: 10px; padding: 0.75rem 1rem;
            color: var(--text-primary); cursor: pointer;
            display: flex; align-items: center; gap: 0.5rem;
            font-family: 'Syne', sans-serif; font-weight: 600; font-size: 0.95rem;
            transition: all 0.2s ease; white-space: nowrap;
            user-select: none;
        }
        .sort-btn:hover { border-color: var(--accent-primary); box-shadow: 0 4px 12px var(--accent-glow); }
        .sort-btn.open { border-color: var(--accent-primary); box-shadow: 0 4px 12px var(--accent-glow); }

        .sort-chevron { transition: transform 0.25s ease; flex-shrink: 0; }
        .sort-btn.open .sort-chevron { transform: rotate(180deg); }

        .sort-menu {
            position: absolute; top: calc(100% + 0.5rem); left: 0;
            min-width: 180px;
            background: var(--bg-card);
            border: 1px solid var(--border-bright);
            border-radius: 12px;
            box-shadow: 0 12px 36px rgba(0,0,0,0.5);
            overflow: hidden;
            z-index: 500;
            opacity: 0; pointer-events: none;
            transform: translateY(-8px) scale(0.97);
            transition: opacity 0.2s ease, transform 0.2s ease;
        }
        .sort-menu.open {
            opacity: 1; pointer-events: all;
            transform: translateY(0) scale(1);
        }

        .sort-option {
            padding: 0.7rem 1.1rem;
            font-size: 0.9rem; font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.15s ease;
            display: flex; align-items: center; justify-content: space-between; gap: 0.5rem;
        }
        .sort-option:hover { background: var(--bg-elevated); color: var(--text-primary); }
        .sort-option.active { color: var(--accent-bright); background: rgba(124,58,237,0.08); }
        .sort-option.active::after {
            content: '✓';
            font-size: 0.8rem;
            color: var(--accent-bright);
        }

        @media (max-width: 768px) {
            .sort-menu { right: 0; left: auto; }
        }
    </style>
</head>

<body>

    <main class="content">

                        <div class="sort-dropdown" id="sortDropdown">

                                <svg class="sort-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
                            </button>
                            <div class="sort-menu" id="sortMenu">
                                <div class="sort-option active" data-sort="default">Default</div>
                                <div class="sort-option" data-sort="az">A → Z</div>
                                <div class="sort-option" data-sort="za">Z → A</div>
                                <div class="sort-option" data-sort="views">Most Viewed</div>
                                <div class="sort-option" data-sort="verified">Verified First</div>

    <!-- ── Modal ── -->
    <div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true">
        <div class="modal" id="modal">
            <button class="modal-close" id="modalClose" aria-label="Close">✕</button>
            <img class="modal-thumb" id="modalThumb" alt="" style="display:none;">
            <div class="modal-body">
                <div class="modal-title-row">
                    <div class="modal-title" id="modalTitle"></div>

                <a class="modal-game" id="modalGame" style="display:none;" target="_blank" rel="noopener">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3.18 0L0 24l20.82-6.18L24 0zm13.5 17.02l-9.18 2.72 2.7-9.18 9.18-2.7z"/></svg>
                    <span id="modalGameName"></span>
                    <svg class="external-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>

                        <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>

    <div class="toast" id="toast">
        <span class="toast-icon"></span>
        <span class="toast-message"></span>
    </div>

    <script>
        // ── Elements ──
        const mainTab        = document.getElementById('mainTab');
        const scriptsTab     = document.getElementById('scriptsTab');
        const scriptsContainer = document.getElementById('scriptsContainer');
        const toast          = document.getElementById('toast');
        const searchInput    = document.getElementById('searchInput');
        const refreshBtn     = document.getElementById('refreshBtn');
        const themeToggle    = document.getElementById('themeToggle');

        const modalOverlay   = document.getElementById('modalOverlay');
        const modalClose     = document.getElementById('modalClose');
        const modalCloseBtn  = document.getElementById('modalCloseBtn');
        const modalCopyBtn   = document.getElementById('modalCopyBtn');
        const modalThumb     = document.getElementById('modalThumb');
        const modalTitle     = document.getElementById('modalTitle');
        const modalGame      = document.getElementById('modalGame');
        const modalGameName  = document.getElementById('modalGameName');
        const modalBadges    = document.getElementById('modalBadges');
        const modalCode      = document.getElementById('modalCode');

        let allScripts = [];
        let currentScript = null;
        let currentSort = 'default';

        // ── Sort Dropdown ──
        const sortBtn    = document.getElementById('sortBtn');
        const sortMenu   = document.getElementById('sortMenu');
        const sortLabel  = document.getElementById('sortLabel');

        const sortLabels = {
            default:   'Sort: Default',
            az:        'Sort: A → Z',
            za:        'Sort: Z → A',
            views:     'Sort: Most Viewed',
            verified:  'Sort: Verified',
            universal: 'Sort: Universal',
        };

        sortBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            const open = sortMenu.classList.toggle('open');
            sortBtn.classList.toggle('open', open);
            sortBtn.setAttribute('aria-expanded', open);
        });

        document.addEventListener('click', () => {
            sortMenu.classList.remove('open');
            sortBtn.classList.remove('open');
            sortBtn.setAttribute('aria-expanded', false);
        });

        sortMenu.addEventListener('click', (e) => {
            const opt = e.target.closest('.sort-option');
            if (!opt) return;
            currentSort = opt.dataset.sort;
            sortLabel.textContent = sortLabels[currentSort];
            document.querySelectorAll('.sort-option').forEach(o => o.classList.toggle('active', o.dataset.sort === currentSort));
            sortMenu.classList.remove('open');
            sortBtn.classList.remove('open');
            applyFiltersAndSort();
        });

        function sortScripts(scripts) {
            const arr = [...scripts];
            switch (currentSort) {
                case 'az':        return arr.sort((a,b) => {
                    const ka = a.isUniversal ? (a.title||'') : (a.game?.name || a.title || '');
                    const kb = b.isUniversal ? (b.title||'') : (b.game?.name || b.title || '');
                    return ka.localeCompare(kb);
                });
                case 'za':        return arr.sort((a,b) => {
                    const ka = a.isUniversal ? (a.title||'') : (a.game?.name || a.title || '');
                    const kb = b.isUniversal ? (b.title||'') : (b.game?.name || b.title || '');
                    return kb.localeCompare(ka);
                });
                case 'views':     return arr.sort((a,b) => (b.views||b.viewCount||0) - (a.views||a.viewCount||0));
                case 'verified':  return arr.sort((a,b) => (b.verified?1:0) - (a.verified?1:0));
                case 'universal': return arr.sort((a,b) => (b.isUniversal?1:0) - (a.isUniversal?1:0));
                default:          return arr;
            }
        }

        // ── Theme ──
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
        themeToggle.addEventListener('click', () => {
            const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
        });

        // ── Utilities ──
        function escapeHtml(text) {
            const d = document.createElement('div');
            d.textContent = text;
            return d.innerHTML;
        }

        function showToast(message, type = 'success') {
            const msg  = toast.querySelector('.toast-message');
            const icon = toast.querySelector('.toast-icon');
            msg.textContent  = message;
            icon.textContent = type === 'success' ? '✓' : '✕';
            toast.className  = 'toast show ' + type;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        async function copyScript(code) {
            try {
                if (navigator.clipboard && window.isSecureContext) {
                    await navigator.clipboard.writeText(code);
                } else {
                    const ta = document.createElement('textarea');
                    ta.value = code;
                    ta.style.cssText = 'position:fixed;left:-9999px;top:-9999px';
                    document.body.appendChild(ta);
                    ta.focus(); ta.select();
                    document.execCommand('copy');
                    ta.remove();
                }
                showToast('Script copied to clipboard!', 'success');

                // Button feedback
                const orig = modalCopyBtn.innerHTML;
                modalCopyBtn.innerHTML = `<svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:white;fill:none;stroke-width:2"><polyline points="20 6 9 17 4 12"/></svg> Copied!`;
                modalCopyBtn.style.background = 'linear-gradient(135deg, #10b981, #059669)';
                setTimeout(() => {
                    modalCopyBtn.innerHTML = orig;
                    modalCopyBtn.style.background = '';
                }, 2000);
            } catch {
                showToast('Failed to copy script', 'error');
            }
        }

        // ── Modal ──
        function openModal(script) {
            currentScript = script;

            // Thumbnail
            const imageUrl = (script.game && script.game.imageUrl) || script.scriptImage || script.image || script.imageUrl;
            if (imageUrl) {
                modalThumb.src = imageUrl;
                modalThumb.style.display = 'block';
                modalThumb.onerror = () => { modalThumb.style.display = 'none'; };
            } else {
                modalThumb.style.display = 'none';
            }

            // Title
            modalTitle.textContent = script.title || 'Untitled Script';

            // Game
            if (script.game && script.game.name) {
                modalGameName.textContent = script.game.name;
                const gameId = script.game.id || script.game.gameId || script.gameId;
                if (gameId) {
                    modalGame.href = `https://www.roblox.com/games/${gameId}`;
                } else {
                    modalGame.removeAttribute('href');
                }
                modalGame.style.display = 'inline-flex';
            } else {
                modalGame.style.display = 'none';
            }

            // Badges
            let badges = '';
            if (script.isUniversal) badges += '<span class="badge universal">Universal</span>';
            if (script.key)         badges += '<span class="badge key-system">Key System</span>';
            if (script.verified)    badges += '<span class="badge verified">Verified</span>';
            modalBadges.innerHTML = badges;

            // Code
            modalCode.textContent = script.script || 'No script content available.';

            // Open
            modalOverlay.classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modalOverlay.classList.remove('open');
            document.body.style.overflow = '';
            currentScript = null;
        }

        modalClose.addEventListener('click', closeModal);
        modalCloseBtn.addEventListener('click', closeModal);
        modalCopyBtn.addEventListener('click', () => currentScript && copyScript(currentScript.script || ''));
        modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) closeModal(); });
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

        // ── Fetch ──
        async function fetchScripts() {
            refreshBtn.classList.add('loading');
            scriptsContainer.innerHTML = `<div class="loading-spinner"><div class="spinner"></div><p>Loading scripts from ScriptBlox…</p></div>`;
            try {
                const res  = await fetch('https://scriptblox.com/api/script/search?q=KSRxQmBvZ');
                const data = await res.json();
                if (!data.result?.scripts?.length) {
                    scriptsContainer.innerHTML = `<div class="empty-state"><h3>No scripts found</h3><p>No scripts available from this search</p></div>`;
                    allScripts = [];
                    return;
                }
                allScripts = data.result.scripts;
                renderScripts(sortScripts(allScripts));
                showToast(`Loaded ${allScripts.length} scripts!`, 'success');
            } catch (err) {
                console.error(err);
                scriptsContainer.innerHTML = `<div class="empty-state"><h3>Error loading scripts</h3><p>Failed to fetch from ScriptBlox. Please try again.</p></div>`;
                showToast('Failed to load scripts', 'error');
                allScripts = [];
            } finally {
                refreshBtn.classList.remove('loading');
            }
        }

        // ── Render ──
        function renderScripts(scripts) {
            scriptsContainer.innerHTML = '';
            if (!scripts.length) {
                scriptsContainer.innerHTML = `<div class="empty-state"><h3>No scripts match your search</h3><p>Try a different search term</p></div>`;
                return;
            }

            scripts.forEach((script, i) => {
                const card = document.createElement('div');
                card.className = 'script-card';
                card.style.animationDelay = `${i * 0.04}s`;

                const imageUrl = (script.game && script.game.imageUrl) || script.scriptImage || script.image || script.imageUrl;

                // Badges
                let badges = '';
                if (script.isUniversal) badges += '<span class="badge universal">Universal</span>';
                if (script.key)         badges += '<span class="badge key-system">Key System</span>';
                if (script.verified)    badges += '<span class="badge verified">Verified</span>';

                // Snippet (first 3 lines)
                const snippet = (script.script || 'No content').split('\n').slice(0, 3).join('\n');

                card.innerHTML = `
                    ${imageUrl ? `<div class="card-thumb-wrap"><img class="script-thumbnail" src="${escapeHtml(imageUrl)}" alt="${escapeHtml(script.title || '')}" onerror="this.closest('.card-thumb-wrap').remove()"></div>` : ''}
                    <div class="card-body">
                        <div class="card-top">
                            <div class="card-title">${escapeHtml(script.title || 'Untitled Script')}</div>
                        </div>
                        ${script.game?.name ? `<div class="card-game">🎮 ${escapeHtml(script.game.name)}</div>` : ''}
                        <div class="card-snippet">${escapeHtml(snippet)}</div>
                        <div class="card-footer">
                            <div class="script-badges">${badges}</div>
                            <button class="view-btn">View Script →</button>
                        </div>
                    </div>
                `;

                // Click anywhere on card or view button → open modal
                card.addEventListener('click', () => openModal(script));
                scriptsContainer.appendChild(card);
            });
        }

        // ── Search + Sort ──
        function applyFiltersAndSort() {
            const q = searchInput.value.toLowerCase().trim();
            let results = q
                ? allScripts.filter(s =>
                    (s.title || '').toLowerCase().includes(q) ||
                    (s.game?.name || '').toLowerCase().includes(q) ||
                    (s.script || '').toLowerCase().includes(q))
                : allScripts;
            renderScripts(sortScripts(results));
        }

        // ── Tab switching ──
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                const name = tab.dataset.tab;
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                mainTab.style.display   = name === 'main'    ? 'block' : 'none';
                scriptsTab.style.display = name === 'scripts' ? 'block' : 'none';
                if (name === 'scripts' && !allScripts.length) fetchScripts();
            });
        });

        searchInput.addEventListener('input', applyFiltersAndSort);
        refreshBtn.addEventListener('click', fetchScripts);
    </script>
</body>
